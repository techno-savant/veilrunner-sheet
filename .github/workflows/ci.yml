name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout veilrunner-sheet
        uses: actions/checkout@v4
        with:
          path: veilrunner-sheet
      - name: Checkout lexicon-core (sibling)
        uses: actions/checkout@v4
        with:
          repository: techno-savant/lexicon-core
          path: lexicon-core
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: veilrunner-sheet/package-lock.json
      - name: Install dependencies
        working-directory: veilrunner-sheet
        run: npm ci
      - name: Typecheck
        working-directory: veilrunner-sheet
        run: npm run typecheck

  build:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - name: Checkout veilrunner-sheet
        uses: actions/checkout@v4
        with:
          path: veilrunner-sheet
      - name: Checkout lexicon-core (sibling)
        uses: actions/checkout@v4
        with:
          repository: techno-savant/lexicon-core
          path: lexicon-core
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: veilrunner-sheet/package-lock.json
      - name: Install dependencies
        working-directory: veilrunner-sheet
        run: npm ci
      - name: Build
        working-directory: veilrunner-sheet
        run: npm run build
